<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Merch - Rock &amp; Fire</title>
    <meta
      name="description"
      content="Merch oficial de Rock & Fire en colaboracion con nuestro sponsor Gaucho Store."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body id="top">
    <header class="site-header">
      <a class="brand" href="index.html#top">
        <img class="brand-logo" src="img/logoRyF 1.png" alt="Rock &amp; Fire" />
        <span>Rock &amp; Fire</span>
      </a>
      <nav class="nav">
        <a href="index.html#top">Inicio</a>
        <a href="about.html">Sobre nosotros</a>
      </nav>
    </header>

    <section class="section reveal merch-hero">
      <h1>Merch Rock & Fire</h1>
      <p class="merch-intro">
        Indumentaria oficial creada junto a nuestro sponsor.
        Calidad, identidad y fuego en cada prenda.
        <span class="inline-sponsor">
          En alianza con
          <a href="https://www.gauchostore.com.ar/" target="_blank" rel="noreferrer">
            <img src="img/gauchoStore%20logo.webp" alt="Gaucho Store" />
          </a>
        </span>
      </p>
      <a class="cta" href="https://www.gauchostore.com.ar/" target="_blank" rel="noreferrer">
        Visitar Gaucho Store
      </a>
    </section>

    <section class="section alt reveal" id="merch-galeria">
      <h2>Galeria de ropa</h2>
      <div class="merch-grid">
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/1.webp" alt="Merch Rock & Fire 1" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/2.webp" alt="Merch Rock & Fire 2" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/3.webp" alt="Merch Rock & Fire 3" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/4.webp" alt="Merch Rock & Fire 4" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/5.webp" alt="Merch Rock & Fire 5" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/6.webp" alt="Merch Rock & Fire 6" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/7.webp" alt="Merch Rock & Fire 7" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/8.webp" alt="Merch Rock & Fire 8" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/9.webp" alt="Merch Rock & Fire 9" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/10.webp" alt="Merch Rock & Fire 10" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/11.webp" alt="Merch Rock & Fire 11" />
        </article>
        <article class="merch-card">
          <img data-lightbox="merch" src="img/Ropa/12.webp" alt="Merch Rock & Fire 12" />
        </article>
      </div>
    </section>

    <footer>Rock &amp; Fire &middot; Cocina en vivo</footer>

    <div class="lightbox" id="lightbox">
      <span>Cerrar</span>
      <button class="lightbox-nav prev" type="button" aria-label="Anterior">&#10094;</button>
      <img src="" alt="Imagen ampliada" />
      <button class="lightbox-nav next" type="button" aria-label="Siguiente">&#10095;</button>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
